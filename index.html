<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLIXSTOR</title>
<style>
:root{
  --bg-color: #0b0b0b;
  --main-color: #c0c0c0;
  --accent-color: #d4af37;
}
body{
  margin:0;
  font-family: Arial, sans-serif;
  background-color: var(--bg-color);
  color: var(--main-color);
}
header{
  text-align:center;
  padding:20px;
}
header img{
  max-width:150px;
}
header h1{
  color: var(--accent-color);
  margin:10px 0 5px 0;
}
header p{
  margin:0;
  font-size:16px;
}

/* أفضل عرض اليوم */
#deal{
  background:#1a1a1a;
  margin:20px auto;
  padding:20px;
  max-width:600px;
  border:2px solid var(--accent-color);
  text-align:center;
  border-radius:10px;
}
#deal h2{
  color: var(--accent-color);
}
#deal span{
  font-weight:bold;
  color:#fff;
}

/* شبكة المنتجات */
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  max-width:1000px;
  margin:20px auto;
}
.product-card{
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  text-align:center;
  transition: transform 0.3s;
}
.product-card:hover{
  transform: scale(1.05);
  border:2px solid var(--accent-color);
}
.product-card img{
  max-width:100px;
  margin-bottom:10px;
}
.product-card button{
  background: var(--accent-color);
  border:none;
  padding:10px 20px;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  border-radius:5px;
  margin-top:10px;
}

/* الدول والأسعار */
.options, .prices{
  display:none;
  margin-top:10px;
}
.options button, .prices button{
  margin:5px;
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background: var(--accent-color);
  color:#000;
  font-weight:bold;
}

/* السلة العائمة */
#cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background: var(--accent-color);
  color:#000;
  border:none;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:24px;
  cursor:pointer;
  z-index:1000;
}
#cart{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#1a1a1a;
  border:2px solid var(--accent-color);
  padding:15px;
  width:250px;
  display:none;
  border-radius:10px;
  color:#fff;
  z-index:1000;
}
#cart h3{
  margin-top:0;
}
#cart-item{
  max-height:200px;
  overflow-y:auto;
  margin-bottom:10px;
}
#cart button{
  background: var(--accent-color);
  border:none;
  color:#000;
  padding:10px;
  width:100%;
  border-radius:5px;
  cursor:pointer;
}

/* لوحة التحكم */
#admin-panel{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  color:#fff;
  padding:20px;
  overflow:auto;
  z-index:2000;
}
#admin-panel input, #admin-panel button{
  margin:5px 0;
  padding:5px;
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Logo_sample.png" alt="SOLIX Logo">
  <h1>SOLIX</h1>
  <p>الاحترافية ليست خيارًا… بل معيارنا ⚖️ تنفيذ فوري. ثقة دائمة 🔐</p>
</header>

<!-- أفضل عرض اليوم -->
<div id="deal">
  <h2>🔥 أفضل عرض اليوم</h2>
  <p id="deal-product">PUBG 600 UC</p>
  <p>السعر القديم: <span id="old-price">140 د.ل</span></p>
  <p>السعر الجديد: <span id="new-price">110 د.ل</span></p>
  <p>ينتهي خلال: <span id="timer">24:00:00</span></p>
</div>

<!-- المنتجات -->
<div class="products">
  <!-- iTunes -->
  <div class="product-card" data-name="iTunes">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/ITunes_Logo.svg" alt="iTunes">
    <h3>iTunes</h3>
    <button onclick="showOptions(this)">عرض الأسعار</button>
    <div class="options">
      <button onclick="selectCountry(this)">أمريكا</button>
      <button onclick="selectCountry(this)">تركيا</button>
      <button onclick="selectCountry(this)">السعودية</button>
      <button onclick="selectCountry(this)">الإمارات</button>
      <button onclick="selectCountry(this)">بريطانيا</button>
    </div>
    <div class="prices"></div>
  </div>

  <!-- PlayStation -->
  <div class="product-card" data-name="PlayStation">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/PlayStation_logo.svg" alt="PlayStation">
    <h3>PlayStation</h3>
    <button onclick="showOptions(this)">عرض الأسعار</button>
    <div class="options">
      <button onclick="selectCountry(this)">أمريكا</button>
      <button onclick="selectCountry(this)">تركيا</button>
      <button onclick="selectCountry(this)">السعودية</button>
      <button onclick="selectCountry(this)">الإمارات</button>
      <button onclick="selectCountry(this)">بريطانيا</button>
    </div>
    <div class="prices"></div>
  </div>

  <!-- Xbox -->
  <div class="product-card" data-name="Xbox">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/43/Xbox_logo_%282019%29.svg" alt="Xbox">
    <h3>Xbox</h3>
    <button onclick="showOptions(this)">عرض الأسعار</button>
    <div class="options">
      <button onclick="selectCountry(this)">أمريكا</button>
      <button onclick="selectCountry(this)">تركيا</button>
      <button onclick="selectCountry(this)">السعودية</button>
      <button onclick="selectCountry(this)">الإمارات</button>
      <button onclick="selectCountry(this)">بريطانيا</button>
    </div>
    <div class="prices"></div>
  </div>

  <!-- Snapchat+ -->
  <div class="product-card" data-name="Snapchat+">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/Snapchat_logo.svg" alt="Snapchat+">
    <h3>Snapchat+</h3>
    <button onclick="showOptions(this)">عرض الأسعار</button>
    <div class="options">
      <button onclick="selectCountry(this)">أمريكا</button>
      <button onclick="selectCountry(this)">تركيا</button>
      <button onclick="selectCountry(this)">السعودية</button>
      <button onclick="selectCountry(this)">الإمارات</button>
      <button onclick="selectCountry(this)">بريطانيا</button>
    </div>
    <div class="prices"></div>
  </div>

  <!-- PUBG -->
  <div class="product-card" data-name="PUBG">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/51/PUBG_logo.svg" alt="PUBG">
    <h3>PUBG</h3>
    <button onclick="showOptions(this)">عرض الأسعار</button>
    <div class="options"></div>
    <div class="prices">
      <button onclick="addToCart('PUBG 60 UC', 60)">60 UC</button>
      <button onclick="addToCart('PUBG 300 UC', 300)">300 UC</button>
      <button onclick="addToCart('PUBG 600 UC', 600)">600 UC</button>
    </div>
  </div>
</div>

<!-- سلة عائمة -->
<button id="cart-btn" onclick="toggleCart()">🛒</button>
<div id="cart">
  <h3>سلة المشتريات</h3>
  <div id="cart-item"></div>
  <p>الإجمالي: <span id="total">0</span> د.ل</p>
  <button onclick="checkout()">اطلب عبر واتساب</button>
</div>

<!-- لوحة التحكم -->
<div id="admin-panel">
  <h2>لوحة التحكم</h2>
  <p>كلمة السر: <span id="admin-pass">Asdweb2009</span></p>
  <input type="text" id="new-rate" placeholder="سعر الصرف الجديد">
  <button onclick="changeRate()">تغيير سعر الصرف</button>
</div>

<script>
let USD = 11;
let cart = [];
let currentProduct=null;

function showOptions(btn){
  let card = btn.parentElement;
  let options = card.querySelector('.options');
  let prices = card.querySelector('.prices');
  options.style.display = options.style.display === 'block' ? 'none':'block';
  prices.style.display = 'none';
}

function selectCountry(btn){
  let card = btn.closest('.product-card');
  let prices = card.querySelector('.prices');
  prices.style.display = 'block';
  currentProduct = card.dataset.name;
  prices.innerHTML='';
  let amounts = [5,10,25,50,100];
  if(currentProduct==='PUBG') amounts=[60,300,600];
  amounts.forEach(a=>{
    let b=document.createElement('button');
    b.innerText = currentProduct==='PUBG'?a+' UC':'$'+a;
    b.onclick=()=>addToCart(currentProduct+' '+(currentProduct==='PUBG'?a+' UC':'$'+a),a);
    prices.appendChild(b);
  });
}

function toggleCart(){
  let c=document.getElementById('cart');
  c.style.display = c.style.display==='block'?'none':'block';
}
function addToCart(name,priceUSD){
  let priceLYD = priceUSD*USD;
  cart.push({name,price:priceLYD});
  renderCart();
}
function renderCart(){
  let html='';
  let total=0;
  cart.forEach(item=>{
    html+=`<p>${item.name} - ${item.price} د.ل</p>`;
    total+=item.price;
  });
  document.getElementById('cart-item').innerHTML=html;
  document.getElementById('total').innerText=total;
}
function checkout(){
  let msg = 'طلب من موقع SOLIXSTOR\n\n';
  cart.forEach(item=> msg+=item.name+' - '+item.price+' د.ل\n');
  msg+='الإجمالي: '+document.getElementById('total').innerText+' د.ل';
  window.open('https://wa.me/218948002556?text='+encodeURIComponent(msg),'_blank');
}

/* أفضل عرض اليوم */
let dealSeconds = 24*60*60;
function updateTimer(){
  let h=Math.floor(dealSeconds/3600);
  let m=Math.floor((dealSeconds%3600)/60);
  let s=dealSeconds%60;
  document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  if(dealSeconds>0) dealSeconds--; else document.getElementById('deal').style.display='none';
}
setInterval(updateTimer,1000);

/* لوحة التحكم */
document.addEventListener('keydown',e=>{
  if(e.ctrlKey && e.key==='a'){
    let pass = prompt('ادخل كلمة السر:');
    if(pass==='Asdweb2009') document.getElementById('admin-panel').style.display='block';
    else alert('كلمة السر خاطئة!');
  }
});
function changeRate(){
  let val = parseFloat(document.getElementById('new-rate').value);
  if(val>0){ USD=val; alert('تم تغيير سعر الصرف إلى '+USD); document.getElementById('new-rate').value=''; renderCart();}
  else alert('أدخل قيمة صحيحة');
}
</script>
</body>
</html>
